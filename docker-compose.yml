services:
  notebooklm-file-splitter:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: notebooklm-file-splitter-tool:local
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - stats-data:/data
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    name: notebooklm-file-splitter-tool_app
    internal: true

volumes:
  stats-data:
